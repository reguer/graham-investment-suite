<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Graham Investment Suite - Dashboard Local</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, Segoe UI, Arial, sans-serif; background: #07111f; color: #e5eefb; }
      body { margin: 0; min-height: 100vh; display: grid; grid-template-rows: auto 1fr; }
      header { padding: 16px 18px; border-bottom: 1px solid #1e293b; background: #0b1020; }
      h1 { margin: 0; font-size: 20px; letter-spacing: 0; }
      p { margin: 6px 0 0; color: #94a3b8; }
      code { color: #93c5fd; }
      .bar { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
      a, button { border: 1px solid #334155; border-radius: 6px; background: #111827; color: #e5eefb; padding: 9px 11px; text-decoration: none; cursor: pointer; }
      a.primary { border-color: #3b82f6; background: #16345f; }
      iframe { width: 100%; height: 100%; border: 0; background: #07111f; }
      .fallback { padding: 18px; max-width: 780px; }
    </style>
  </head>
  <body>
    <header>
      <h1>Graham Investment Suite - Dashboard Local</h1>
      <p>Primero levanta el servidor con <code>npm run dev:safe</code>. Esta pagina intenta cargar <code>http://127.0.0.1:5173/</code>.</p>
      <div class="bar">
        <a class="primary" href="http://127.0.0.1:5173/" target="_blank" rel="noreferrer">Abrir 5173</a>
        <a href="http://127.0.0.1:5174/" target="_blank" rel="noreferrer">Abrir 5174</a>
        <a href="http://127.0.0.1:5175/" target="_blank" rel="noreferrer">Abrir 5175</a>
        <button type="button" onclick="location.reload()">Reintentar</button>
      </div>
    </header>
    <iframe src="http://127.0.0.1:5173/" title="Dashboard local"></iframe>
  </body>
</html>
